packages:
  - "apps/*"
  - "packages/*"
  - "plugins/*"

allowBuilds:
  '@nestjs/core': set this to true or false
  esbuild: set this to true or false

# pnpm v11 构建脚本白名单。
# esbuild 需要 postinstall 写入原生二进制 shim（Vite/Vitest 依赖）。
onlyBuiltDependencies:
  - esbuild
  - "@nestjs/core"

# pnpm v11 在 run 前会校验依赖状态；存在未批准构建脚本时会中断命令。
# 显式关闭，避免本地命令被 ignored builds 阻断。
verifyDepsBeforeRun: false
