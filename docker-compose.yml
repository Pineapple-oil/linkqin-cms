# 本地开发依赖：PostgreSQL + Redis（可选）。
# API / Admin 在本地直接用 pnpm dev 运行，方便热更新。
# 启动：docker compose up -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: linkqin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: linkqin
      POSTGRES_PASSWORD: linkqin
      POSTGRES_DB: linkqin
    ports:
      - "5432:5432"
    volumes:
      - linkqin-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkqin -d linkqin"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: linkqin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  linkqin-pgdata:
